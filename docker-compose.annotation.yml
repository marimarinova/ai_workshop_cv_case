services:
  label-studio:
    image: heartexlabs/label-studio:1.15.0
    container_name: label-studio
    restart: unless-stopped
    ports:
      - "${ANNOTATION_PORT:-8080}:8080"
    volumes:
      - ./resources/annotations:/label-studio/videos/samples:ro
      - label-studio-data:/label-studio/data
      - ./annotation/label_studio_config.xml:/label-studio/config.xml:ro
    environment:
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /label-studio/videos
      LOCAL_FILES_SERVING_ENABLED: "true"
      LOCAL_FILES_DOCUMENT_ROOT: /label-studio/videos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  label-studio-data:
    name: label-studio-data
