# Track A classifier configuration
# Used by: pickup-putdown train-track-a

classifiers:
  random_seed: 42

  hand_state:
    confidence_threshold: 0.60
    margin_threshold: 0.15
    class_weight: balanced
    max_iter: 1000

  shelf_state:
    confidence_threshold: 0.60
    margin_threshold: 0.15
    class_weight: balanced
    max_iter: 1000
